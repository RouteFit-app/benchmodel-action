name: "BenchModel AI Code Review"
description: "Review a pull request's diff with BenchModel and post the findings as a PR comment. Optionally fail the check on high-severity issues."
author: "BenchModel"
branding:
  icon: "check-circle"
  color: "purple"

inputs:
  token:
    description: "BenchModel personal API token (bm_...). Store it as a repo secret named BENCHMODEL_TOKEN and pass that secret in as this input."
    required: true
  model:
    description: "Reviewer model id (e.g. claude-sonnet-4-6, gpt-5.6, gemini-3.1-pro-preview, deepseek-v4-pro). Uses your BenchModel-stored key for that provider."
    required: false
    default: "claude-sonnet-4-6"
  api-url:
    description: "BenchModel API base URL."
    required: false
    default: "https://benchmodel-production.up.railway.app"
  max-chars:
    description: "Skip review if the diff is larger than this many characters (keeps cost/latency bounded)."
    required: false
    default: "60000"
  fail-on:
    description: "Fail the check if a finding at this severity or higher is found: 'high', 'medium', or 'none' (comment only, never fail)."
    required: false
    default: "none"
  github-token:
    description: "Token used to read the PR diff and post the comment. Defaults to the workflow's GITHUB_TOKEN."
    required: false
    default: ${{ github.token }}

runs:
  using: "composite"
  steps:
    - name: BenchModel review
      shell: bash
      env:
        BM_TOKEN: ${{ inputs.token }}
        BM_MODEL: ${{ inputs.model }}
        BM_API: ${{ inputs.api-url }}
        BM_MAX: ${{ inputs.max-chars }}
        BM_FAILON: ${{ inputs.fail-on }}
        GH_TOKEN: ${{ inputs.github-token }}
        GH_REPO: ${{ github.repository }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
      run: |
        set -euo pipefail
        if [ -z "${PR_NUMBER:-}" ]; then
          echo "No pull_request in context; this action runs on pull_request events. Skipping."
          exit 0
        fi

        echo "Fetching diff for PR #$PR_NUMBER in $GH_REPO ..."
        gh pr diff "$PR_NUMBER" --repo "$GH_REPO" > /tmp/bm_diff.txt || {
          echo "Could not read PR diff for #$PR_NUMBER in $GH_REPO. The workflow needs 'contents: read' (and 'pull-requests: read')."; exit 1;
        }

        SIZE=$(wc -c < /tmp/bm_diff.txt | tr -d ' ')
        if [ "$SIZE" -eq 0 ]; then echo "Empty diff, nothing to review."; exit 0; fi
        if [ "$SIZE" -gt "$BM_MAX" ]; then
          echo "Diff is $SIZE chars (> max $BM_MAX). Skipping review to bound cost. Raise 'max-chars' to include it."
          exit 0
        fi

        echo "Requesting review from $BM_MODEL ($SIZE chars) ..."
        python3 -c "import json,sys; d=open('/tmp/bm_diff.txt',encoding='utf-8',errors='replace').read(); sys.stdout.write(json.dumps({'reviewer_ai':sys.argv[1],'writer_summary':'Automated pull-request review via GitHub Action','output':d}))" "$BM_MODEL" > /tmp/bm_body.json

        BODY_BYTES=$(wc -c < /tmp/bm_body.json | tr -d ' ')
        echo "Request body: ${BODY_BYTES} bytes"
        python3 -c "import json;json.load(open('/tmp/bm_body.json'))" 2>/tmp/bm_jsonerr || {
          echo "Request body is not valid JSON per Python:"; cat /tmp/bm_jsonerr;
          echo "First 200 bytes:"; head -c 200 /tmp/bm_body.json; echo; exit 1;
        }

        HTTP=$(curl -sS --http1.1 -H "Expect:" -o /tmp/bm_resp.json -w "%{http_code}" -X POST "$BM_API/api/reviews" \
          -H "Authorization: Bearer $BM_TOKEN" \
          -H "Content-Type: application/json" \
          --data-binary @/tmp/bm_body.json) || { echo "Request to BenchModel failed."; exit 1; }

        if [ "$HTTP" != "200" ]; then
          echo "BenchModel returned HTTP $HTTP:"; cat /tmp/bm_resp.json; echo
          echo "---- request diagnostics ----"
          echo "URL: $BM_API/api/reviews"
          echo "Body: ${BODY_BYTES} bytes; starts: $(head -c 60 /tmp/bm_body.json)"
          echo "Proxy env: http_proxy='${http_proxy:-}' https_proxy='${https_proxy:-}' HTTPS_PROXY='${HTTPS_PROXY:-}'"
          echo "---- verbose exchange (token redacted) ----"
          curl -v -sS --http1.1 -H "Expect:" -o /dev/null -X POST "$BM_API/api/reviews" \
            -H "Authorization: Bearer $BM_TOKEN" \
            -H "Content-Type: application/json" \
            --data-binary @/tmp/bm_body.json 2>&1 \
            | sed -E 's/(Bearer )[A-Za-z0-9_.-]+/\1[REDACTED]/' | grep -E '^[*<>]' | head -n 60 || true
          # A 4xx here usually means a bad/expired token, no stored provider key, or an oversized diff.
          exit 1
        fi
        N=$(jq '.findings | length' /tmp/bm_resp.json)
        echo "Findings: $N"

        {
          echo "## 🤖 BenchModel review — \`$BM_MODEL\`"
          echo ""
          SUM=$(jq -r '.summary // ""' /tmp/bm_resp.json)
          [ -n "$SUM" ] && { echo "$SUM"; echo ""; }
          if [ "$N" -eq 0 ]; then
            echo "No issues found in this diff. ✅"
          else
            echo "| Severity | Location | Issue |"
            echo "|---|---|---|"
            jq -r '.findings[] | "| \(.severity // "?") | `\(.file // "?"):\(.line_range // "?")` | \(.issue // "" | gsub("\n";" ") | gsub("\\|";"\\\\|")) |"' /tmp/bm_resp.json
            echo ""
            echo "<details><summary>Suggested fixes</summary>"
            echo ""
            jq -r '.findings[] | "- **\(.file // "?"):\(.line_range // "?")** — \(.suggested_fix // "" | gsub("\n";" "))"' /tmp/bm_resp.json
            echo ""
            echo "</details>"
          fi
          echo ""
          echo "<sub>Reviewed by <a href=\"https://benchmodel.io\">BenchModel</a>. Model chosen by you; run keyless at benchmodel.io/try.</sub>"
        } > /tmp/bm_comment.md

        gh pr comment "$PR_NUMBER" --repo "$GH_REPO" --body-file /tmp/bm_comment.md || {
          echo "Could not post the review comment. The workflow must grant 'pull-requests: write'."; exit 1;
        }

        if [ "$BM_FAILON" = "none" ]; then exit 0; fi
        if [ "$BM_FAILON" = "high" ]; then
          HITS=$(jq '[.findings[] | select((.severity//""|ascii_downcase)=="high")] | length' /tmp/bm_resp.json)
        else
          HITS=$(jq '[.findings[] | select((.severity//""|ascii_downcase)=="high" or (.severity//""|ascii_downcase)=="medium")] | length' /tmp/bm_resp.json)
        fi
        if [ "$HITS" -gt 0 ]; then
          echo "Failing check: $HITS finding(s) at severity >= $BM_FAILON."
          exit 1
        fi
        echo "No findings at or above '$BM_FAILON'. Check passes."
